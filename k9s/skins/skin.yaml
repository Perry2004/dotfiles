# -----------------------------------------------------------------------------
# Transparent skin for TokyoNight (Day / Storm)
# Text/bg: inherit from terminal via "default"
# Highlight/cursor/focus: medium-toned colors visible on both light & dark
# -----------------------------------------------------------------------------

k9s:
  body:
    fgColor: default
    bgColor: default
    logoColor: default
    logoColorMsg: default
    logoColorInfo: default
    logoColorWarn: default
    logoColorError: default
  prompt:
    fgColor: default
    bgColor: default
    suggestColor: default
    border:
      command: default
      default: default
  help:
    fgColor: default
    bgColor: default
    sectionColor: default
    keyColor: default
    numKeyColor: default
  info:
    fgColor: default
    sectionColor: default
    cpuColor: default
    memColor: default
    k9sRevColor: default
  dialog:
    fgColor: default
    bgColor: default
    labelFgColor: default
    fieldFgColor: default
    buttonFgColor: white
    buttonBgColor: darkslateblue
    buttonFocusFgColor: white
    buttonFocusBgColor: dodgerblue
  frame:
    border:
      fgColor: default
      focusColor: steelblue
    crumbs:
      fgColor: default
      bgColor: default
      activeColor: orange
    title:
      fgColor: default
      bgColor: default
      highlightColor: fuchsia
      counterColor: default
      filterColor: default
    menu:
      fgColor: default
      keyColor: default
      numKeyColor: default
    status:
      newColor: steelblue
      modifyColor: limegreen
      addColor: dodgerblue
      pendingColor: darkorange
      errorColor: orangered
      highlightColor: cadetblue
      killColor: mediumpurple
      completedColor: lightslategray
  views:
    charts:
      bgColor: default
      dialBgColor: default
      chartBgColor: default
      focusFgColor: white
      focusBgColor: orange
    table:
      fgColor: default
      bgColor: default
      cursorFgColor: white
      cursorBgColor: steelblue
      markColor: mediumseagreen
      header:
        fgColor: default
        bgColor: default
        sorterColor: steelblue
        selectedSortColumnColor: steelblue
    xray:
      fgColor: default
      bgColor: default
      cursorColor: dodgerblue
      cursorTextColor: white
      graphicColor: default
    logs:
      fgColor: default
      bgColor: default
      indicator:
        fgColor: default
        bgColor: default
        toggleOnColor: limegreen
        toggleOffColor: gray
    yaml:
      keyColor: default
      colonColor: default
      valueColor: default
    picker:
      mainColor: default
      focusColor: steelblue
      shortcutColor: steelblue
