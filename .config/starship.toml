format = """
[в–‘в–’в–“](#a3aed2)\
[ оң‘ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$time\
[оӮҙ ](fg:#394260)\
\n[в–‘в–’в–“](#394260)\
[ оһ• ](bg:#394260 fg:#9eceff)\
[оӮҙ](fg:#394260 bg:#2f3b5c)\
$nodejs\
$python\
$java\
$golang\
$terraform\
$docker_context\
$kubernetes\
$cmd_duration\
$jobs\
$status\
[оӮҙ ](fg:#2f3b5c)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#2f3b5c"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[python]
symbol = "оҲө"
style = "bg:#2f3b5c"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[java]
symbol = "оү–"
style = "bg:#2f3b5c"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[golang]
symbol = "у°ҹ“"
style = "bg:#2f3b5c"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[terraform]
symbol = "уұҒў"
style = "bg:#2f3b5c"
format = '[[ $symbol $workspace ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:#2f3b5c"
format = '[[ $symbol $context ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[kubernetes]
disabled = false
symbol = "уұғҫ"
style = "bg:#2f3b5c"
format = '[[ $symbol $context( \($namespace\)) ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#2f3b5c"
format = '[[ пү’ $duration ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[jobs]
symbol = "пҖ“"
style = "bg:#2f3b5c"
format = '[[ $symbol $number ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[status]
disabled = false
symbol = "[вңҳ](fg:#ff9eaf bg:#2f3b5c)"
success_symbol = "[вң”](fg:#9ece6a bg:#2f3b5c)"
style = "bg:#2f3b5c"
format = '[[ $symbol $status ](fg:#c0caf5 bg:#2f3b5c)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#394260"
format = '[[ пҗә $time ](fg:#c0caf5 bg:#394260)]($style)'
